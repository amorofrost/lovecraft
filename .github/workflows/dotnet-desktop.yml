name: .NET Backend CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Lovecraft

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Lovecraft.slnx

    - name: Build
      run: dotnet build Lovecraft.slnx --no-restore --configuration Release

    - name: Test
      run: dotnet test Lovecraft.slnx --no-build --configuration Release --verbosity normal
